<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RestaurantMS{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('menu') }}">
            <i class="bi bi-bowl-hot"></i> RestaurantMS
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                style="color: var(--text-soft);">
            <i class="bi bi-list fs-4"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-1">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/menu' %}active{% endif %}"
                       href="{{ url_for('menu') }}">
                        <i class="bi bi-card-list"></i> Menu
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/order' %}active{% endif %}"
                       href="{{ url_for('order_form') }}">
                        <i class="bi bi-cart3"></i> Place Order
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/orders' %}active{% endif %}"
                       href="{{ url_for('view_orders') }}">
                        <i class="bi bi-receipt"></i> Orders
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/reservation' %}active{% endif %}"
                       href="{{ url_for('reservation_form') }}">
                        <i class="bi bi-calendar-plus"></i> Reserve
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/reservations' %}active{% endif %}"
                       href="{{ url_for('view_reservations') }}">
                        <i class="bi bi-calendar2-check"></i> Reservations
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>
<!-- ===== END NAVBAR ===== -->

<!-- ===== MAIN CONTENT ===== -->
<div class="page-wrapper">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</div>
<!-- ===== END MAIN CONTENT ===== -->

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
    <div class="container">
        <div class="footer-inner">
            <span class="footer-brand">
                <i class="bi bi-bowl-hot"></i> RestaurantMS
            </span>
            <span class="footer-copy">
                &copy; 2026 &mdash; Built by
                <a href="https://www.linkedin.com/in/muhammad-ibrahim-o2"
                   target="_blank" rel="noopener" class="footer-link">
                    Muhammad Ibrahim
                </a>
            </span>
            <span class="footer-copy">
                <i class="bi bi-code-slash" style="color: var(--accent-gold);"></i>
                Python &middot; Flask &middot; SQLite
            </span>
        </div>
    </div>
</footer>
<!-- ===== END FOOTER ===== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
