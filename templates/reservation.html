{% extends 'base.html' %}
{% block title %}Reserve Table — RestaurantMS{% endblock %}

{% block content %}

<div class="form-card">
    <div class="card">

        <div class="card-header">
            <h4>
                <span class="header-icon header-blue">
                    <i class="bi bi-calendar-plus"></i>
                </span>
                Reserve a Table
            </h4>
        </div>

        <div class="card-body">
            <form action="{{ url_for('make_reservation') }}" method="POST">

                <div class="mb-4">
                    <label for="customer_name" class="form-label">
                        <i class="bi bi-person" style="color: var(--accent-gold);"></i>
                        Customer Name
                    </label>
                    <input type="text"
                           class="form-control"
                           id="customer_name"
                           name="customer_name"
                           placeholder="Enter customer name"
                           required>
                </div>

                <div class="mb-4">
                    <label for="table_number" class="form-label">
                        <i class="bi bi-grid-3x3-gap" style="color: var(--accent-gold);"></i>
                        Table Number
                    </label>
                    <select class="form-select" id="table_number" name="table_number" required>
                        <option value="" disabled selected>Select a table (1–15)</option>
                        {% for i in range(1, 16) %}
                            <option value="{{ i }}">Table {{ i }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-5">
                    <label for="reservation_date" class="form-label">
                        <i class="bi bi-calendar-event" style="color: var(--accent-gold);"></i>
                        Reservation Date
                    </label>
                    <input type="date"
                           class="form-control"
                           id="reservation_date"
                           name="reservation_date"
                           required>
                </div>

                <button type="submit" class="btn btn-gold btn-lg w-100">
                    <i class="bi bi-check-circle"></i> Confirm Reservation
                </button>

            </form>
        </div>

        <div class="card-footer text-center">
            <a href="{{ url_for('view_reservations') }}" class="btn btn-sm btn-outline-gold">
                <i class="bi bi-calendar2-check"></i> View All Reservations
            </a>
        </div>

    </div>
</div>

{% endblock %}
